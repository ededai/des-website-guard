name: Des Website Sweep

on:
  schedule:
    - cron: "0 0 * * *"            # daily 08:00 SGT — critical sweep
    - cron: "0 22 * * 0"           # Mon 06:00 SGT — weekly critical+high
    - cron: "0 15 1,15 * *"        # 1st + 15th 23:00 SGT — bi-weekly deep
  workflow_dispatch:
    inputs:
      site:
        description: "Site (trw / aura)"
        required: true
        default: "trw"
      tier:
        description: "Tier (critical / weekly / deep)"
        required: true
        default: "critical"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      # Scheduled runs sweep EVERY active site. The old `inputs.site || 'trw'`
      # meant cron events (which carry no inputs) only ever swept TRW, so AURA
      # went live with zero coverage. Manual dispatch still targets one site.
      matrix:
        site: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.site)) || fromJSON('["trw", "aura"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Pick tier from cron
        id: tier
        run: |
          case "${{ github.event.schedule }}" in
            "0 0 * * *")     echo "tier=critical" >> $GITHUB_OUTPUT ;;
            "0 22 * * 0")    echo "tier=weekly"   >> $GITHUB_OUTPUT ;;
            "0 15 1,15 * *") echo "tier=deep"     >> $GITHUB_OUTPUT ;;
            *)               echo "tier=${{ github.event.inputs.tier }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run Des sweep
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.run --site=${{ matrix.site }} --tier=${{ steps.tier.outputs.tier }}

      - name: Commit updated bug log
        # Runs even when the sweep step fails — findings logged before a
        # crash or an undelivered-alert exit must still persist.
        if: always()
        run: |
          git config user.name "des-bot"
          git config user.email "des-bot@users.noreply.github.com"
          # bug-log.jsonl was untracked, so the old `git diff --quiet` gate
          # never fired and the cloud log was thrown away after every run.
          git add bug-log.jsonl
          if ! git diff --cached --quiet; then
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" || true
            git commit -m "des: update bug log (${{ matrix.site }}) [skip ci]"
            git push
          fi
