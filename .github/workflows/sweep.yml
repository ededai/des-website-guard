name: Des Website Sweep

# Without write permission every "Commit updated bug log" push 403s and the
# day's findings die on the runner (broken 2026-07-04 → 2026-07-10).
permissions:
  contents: write

# Whole-RUN serialization. max-parallel only guards matrix jobs inside one run;
# two dispatched runs (e.g. manual trw + aura) still raced on bug-log.jsonl and
# the loser died in the autostash rebase (2026-07-12, run 29159115532).
concurrency:
  group: des-sweep
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 0 * * *"            # daily 08:00 SGT — critical sweep
    - cron: "0 22 * * 0"           # Mon 06:00 SGT — weekly critical+high
    - cron: "0 15 1,15 * *"        # 1st + 15th 23:00 SGT — bi-weekly deep
  workflow_dispatch:
    inputs:
      site:
        description: "Site (trw / aura)"
        required: true
        default: "trw"
      tier:
        description: "Tier (critical / weekly / deep)"
        required: true
        default: "critical"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      # Both matrix jobs commit to the same bug-log.jsonl; running them
      # concurrently loses one side to an autostash-rebase conflict
      # (trw job died this way on 2026-07-11, run 29146241982).
      max-parallel: 1
      # Scheduled runs sweep EVERY active site. The old `inputs.site || 'trw'`
      # meant cron events (which carry no inputs) only ever swept TRW, so AURA
      # went live with zero coverage. Manual dispatch still targets one site.
      matrix:
        site: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.site)) || fromJSON('["trw", "aura"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Pick tier from cron
        id: tier
        run: |
          case "${{ github.event.schedule }}" in
            "0 0 * * *")     echo "tier=critical" >> $GITHUB_OUTPUT ;;
            "0 22 * * 0")    echo "tier=weekly"   >> $GITHUB_OUTPUT ;;
            "0 15 1,15 * *") echo "tier=deep"     >> $GITHUB_OUTPUT ;;
            *)               echo "tier=${{ github.event.inputs.tier }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run Des sweep
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.run --site=${{ matrix.site }} --tier=${{ steps.tier.outputs.tier }}

      - name: Commit updated bug log
        # Runs even when the sweep step fails — findings logged before a
        # crash or an undelivered-alert exit must still persist.
        if: always()
        env:
          DES_SITE: ${{ matrix.site }}
        run: |
          git config user.name "des-bot"
          git config user.email "des-bot@users.noreply.github.com"
          # Both matrix jobs (trw, aura) check out the run's TRIGGER SHA, so when
          # trw commits + pushes mid-run, aura is still on the pre-run base. A
          # textual `git pull --rebase` then collided on the end-of-file appends
          # both jobs make, and the loser's run FAILED (2026-07-12, -15) — noisy
          # even though the earlier guard kept the log uncorrupted.
          #
          # Fix: never rebase text. Merge by RECORD OWNERSHIP instead — a sweep
          # only changes its own site's records, so on every attempt we reset to
          # the latest origin (other site's truth) and re-lay THIS site's records
          # on top via reporters/merge_bug_log.py. That merge cannot conflict, so
          # the only thing the retry loop races is the plain push.
          if ! git status --porcelain -- bug-log.jsonl | grep -q .; then
            echo "no bug-log changes to commit"; exit 0
          fi
          cp bug-log.jsonl "${RUNNER_TEMP:-/tmp}/bug-log.job.jsonl"
          BR="${GITHUB_REF_NAME:-main}"
          pushed=""
          for i in 1 2 3 4 5; do
            git fetch origin "$BR"
            git reset --hard "origin/$BR"          # HEAD+tree = origin; job copy is safe in RUNNER_TEMP
            python reporters/merge_bug_log.py \
              --site "$DES_SITE" \
              --origin bug-log.jsonl \
              --job "${RUNNER_TEMP:-/tmp}/bug-log.job.jsonl" \
              --out bug-log.jsonl
            if git diff --quiet -- bug-log.jsonl; then
              echo "merged log matches origin; nothing to commit"; pushed=1; break
            fi
            git add bug-log.jsonl
            git commit -m "des: update bug log (${DES_SITE}) [skip ci]"
            if git push; then pushed=1; break; fi
            echo "push rejected (attempt $i), re-merging onto latest origin"
            sleep $((i * 5))
          done
          if [ -z "$pushed" ]; then
            echo "ERROR: bug-log push failed after 5 attempts" >&2
            exit 1
          fi
