name: AURA
url: https://auraanimalrehab.com
sitemap: https://auraanimalrehab.com/sitemap_index.xml
in_charge: Codi
backup_in_charge: Codi
canonical_chrome_baseline: https://auraanimalrehab.com/

# Activated 2026-07-03 during the deep audit (was a pre-launch placeholder;
# the site had been live since ~May 2026 with zero coverage).
active: true

# AURA has no reviewer byline and no TRW address — leave these unset so the
# site-aware checks skip them instead of demanding TRW content on AURA pages.
required_byline: null
address_marker: null
address_unit: null

# Footer fingerprints stay disabled ([]) until the footer is standardised —
# the 2026-07-03 audit found FIVE footer variants live, so locking a canonical
# list now would either storm or bless a broken state. Re-enable after fix.
canonical_footer_fingerprints: []

# Required nav link (same semantics as TRW's coe-results: an href substring that
# checks/visual.check_chrome_consistency demands in every page's nav). The
# 'Visit' item anchors to "#visit" (verified live on /, /about/, /services/);
# this makes the harness-native missing_required_nav_link check cover the
# nav_visit_only_homepage bug going forward. Set to null to disable.
required_nav_link: "#visit"

nav_selector: "header nav, nav"

# --- checks/recheck.py producer config (safe defaults if absent) ---
# home_header_contrast: proof-of-fix marker injected by the deployed header
# scrim/polish CSS. Absent -> the contrast fix is missing -> the recheck fires.
header_scrim_marker: "aura-chrome-polish-css"
# no_mobile_navigation: the deployed mobile-nav fix injects these; any visible
# toggle + drawer counts, but these are checked first. null -> generic fallback.
mobile_nav_toggle_selector: ".aura-mnav-toggle"
mobile_nav_drawer_selector: ".aura-mnav-drawer"

bc_exempt_slugs:
  - /
  - /services/
  - /conditions/
  - /topics/
  - /blog/

skip_paths:
  - /wp-admin/
  - /wp-login.php

priority_paths:
  - /services/
  - /conditions/
  - /contact/
  - /about/
  - /blog/

byline_exempt_paths: []

waivers: []

# Tracked in the bug log with full lifecycle, but never sent in Telegram digests
# (Ed, 2026-07-12: stop pinging em-dash digests; the log + auto-close still run).
digest_mute_checks:
  - em_dash
