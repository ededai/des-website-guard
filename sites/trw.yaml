name: TRW
url: https://therightworkshop.com
sitemap: https://therightworkshop.com/wp-sitemap.xml
in_charge: Bryan
backup_in_charge: Codi
canonical_chrome_baseline: https://therightworkshop.com/

required_markers:
  service_pages:
    - NAV-WHITE-PATCH-2026-04-29
    - MOBILE-NAV-FIX-2026-04-25

# Canonical footer fingerprints — must appear on every published page.
# Source of truth: homepage (WP ID 90). Locked 2026-05-05.
canonical_footer_fingerprints:
  - footer-social-btn
  - footer-brand-logo
  - footer-nav-col
  - footer-brand-tag

# Nav integrity — COE link must be present between Blog and Contact on every page.
required_nav_links:
  - /coe-results/

required_byline: "Reviewed by The Right Workshop team"

required_address_unit: "#02-61"

skip_paths:
  - /wp-admin/
  - /wp-login.php
  - /xmlrpc.php
  - /feed/
  - /comments/feed/
  - /?p=
  - /author/
  - /attachment/

# Pages that don't carry the reviewer byline — hub, utility, and contact pages
byline_exempt_paths:
  - /contact/
  - /about/
  - /team/
  - /faq/
  - /privacy-policy/
  - /terms/
  - /blog/
  - /topics/
  - /services/
  - /brands/
  - /guides/
  - /car-tips/
  - /news/
  - /coe-results/

# Hub and section pages checked first in every sweep — articles follow
priority_paths:
  - /
  - /blog/
  - /services/
  - /topics/
  - /coe-results/
  - /car-tips/
  - /news/
  - /guides/
  - /brands/
  - /contact/
  - /about/

photon_required_paths:
  - /
  - /services/

# Pages that legitimately differ from canonical chrome (no header/footer expected)
chrome_exempt_paths:
  - /privacy-policy/
  - /terms/
