name: TRW
url: https://therightworkshop.com
sitemap: https://therightworkshop.com/sitemap_index.xml   # wp-sitemap.xml now 301s here (RankMath)
in_charge: Bryan
backup_in_charge: Codi
canonical_chrome_baseline: https://therightworkshop.com/

required_markers:
  service_pages:
    - NAV-WHITE-PATCH-2026-04-29
    - MOBILE-NAV-FIX-2026-04-25

# Canonical footer fingerprints — must appear on every published page.
# Re-verified 2026-07-03 against all 128 live pages (each present 128/128).
# The old `footer-nav-col` entry was stale: absent from every page.
canonical_footer_fingerprints:
  - footer-social-btn
  - footer-brand-logo
  - footer-col-title
  - footer-brand-tag
  - footer-grid

# Nav integrity — COE link must be present on every page (href substring).
required_nav_link: coe-results

# --- checks/recheck.py producer config (AURA-only checks; null = use generic
# fallbacks / disable — TRW has no records for these curated ids). Present here
# so every producer's site.get(...) resolves gracefully on both sites. ---
header_scrim_marker: null
mobile_nav_toggle_selector: null
mobile_nav_drawer_selector: null

required_byline: "Reviewed by The Right Workshop team"

address_marker: "Kaki Bukit"
address_unit: "#02-61"

# Pages that legitimately have no breadcrumb (top-level hubs / homepage)
bc_exempt_slugs:
  - /
  - /services/
  - /topics/
  - /brands/
  - /blog/

skip_paths:
  - /wp-admin/
  - /wp-login.php
  - /xmlrpc.php
  - /feed/
  - /comments/feed/
  - /?p=
  - /author/
  - /attachment/

# Pages that don't carry the reviewer byline — hub, utility, and contact pages.
# NOTE: /privacy/ and /terms/ are the live slugs (the old /privacy-policy/
# entry matched nothing).
byline_exempt_paths:
  - /contact/
  - /about/
  - /team/
  - /faq/
  - /privacy/
  - /privacy-policy/
  - /terms/
  - /blog/
  - /topics/
  - /services/
  - /brands/
  - /brands-we-service/
  - /guides/
  - /car-tips/
  - /news/
  - /coe-results/

# Hub and section pages checked first in every sweep — articles follow.
# "/" removed 2026-07-03: as a prefix it matched EVERY url and neutralised
# the ordering (the homepage is prepended in code regardless).
priority_paths:
  - /blog/
  - /services/
  - /topics/
  - /coe-results/
  - /car-tips/
  - /news/
  - /guides/
  - /brands/
  - /contact/
  - /about/

photon_required_paths:
  - /
  - /services/

# Pages that legitimately differ from canonical chrome (no header/footer expected)
chrome_exempt_paths:
  - /privacy/
  - /terms/

# Tracked in the bug log with full lifecycle, but never sent in Telegram digests
# (Ed, 2026-07-12: stop pinging em-dash digests; the log + auto-close still run).
digest_mute_checks:
  - em_dash
